<div class="flex items-center justify-between mb-8">

    <div>

        <h2 class="text-2xl font-semibold text-gray-800">

            {{ title }}

        </h2>

    </div>

    {% if button_text %}

        <a
            href="{{ button_url }}"
            class="bg-blue-600 text-white text-sm px-4 py-2 rounded hover:bg-blue-700 transition"
        >

            {{ button_text }}

        </a>

    {% endif %}

</div>
